<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remote Job Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23080c14'/><circle cx='16' cy='16' r='11' fill='none' stroke='%2300E5CC' stroke-width='1.5' opacity='0.4'/><circle cx='16' cy='16' r='6.5' fill='none' stroke='%2300E5CC' stroke-width='1.5' opacity='0.7'/><circle cx='16' cy='16' r='2.5' fill='%2300E5CC'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:        #080c14;
  --bg2:       #0a1018;
  --card:      #0d1520;
  --card2:     #111c2a;
  --card3:     #15243a;
  --border:    #1c2a3a;
  --border2:   #2a3a4a;
  --teal:      #00E5CC;
  --teal-glow: rgba(0,229,204,0.18);
  --teal-dim:  rgba(0,229,204,0.10);
  --purple:    #B983FF;
  --purple-glow:rgba(185,131,255,0.18);
  --purple-dim:rgba(185,131,255,0.10);
  --amber:     #F5A623;
  --amber-dim: rgba(245,166,35,0.12);
  --mint:      #4ADE80;
  --err:       #EF4444;
  --t1: #e8f0f8;
  --t2: #c8d8e8;
  --t3: #667788;
  --t4: #445566;
  --t5: #2a3a4a;
}

html{background:var(--bg);scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--t2);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;line-height:1.6;min-height:100vh;
}

/* ── HEADER ──────────────────────────────────────────────────────────────── */
.header{
  height:60px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  background:rgba(8,12,20,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  gap:20px;
}
.logo{
  font-size:22px;font-weight:800;letter-spacing:-0.04em;color:var(--t1);
  display:flex;align-items:center;gap:0;flex-shrink:0;
}
.logo-dot{color:var(--teal)}
.logo-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--t4);margin-left:14px;align-self:center;
}

.search{
  display:flex;align-items:center;gap:10px;
  height:38px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;padding:0 14px;
  flex:1;max-width:480px;
  transition:border-color 150ms, box-shadow 150ms;
}
.search:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}
.search input{
  background:none;border:none;outline:none;
  color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;width:100%;
}
.search input::placeholder{color:var(--t4)}
.search-kbd{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--t4);
  background:rgba(8,12,20,0.6);border:1px solid var(--border);
  border-radius:5px;padding:2px 6px;
}

.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}

.status-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:6px 12px;
  font-size:11px;font-weight:500;color:var(--t3);
  font-family:'JetBrains Mono',monospace;letter-spacing:0.03em;
}
.sdot{
  width:7px;height:7px;border-radius:50%;
  background:var(--mint);flex-shrink:0;
  box-shadow:0 0 0 2px rgba(74,222,128,0.30);
  animation:pulse 2s ease-in-out infinite;
}
.sdot.inactive{background:var(--t4);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

.btn-primary{
  height:34px;padding:0 16px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:0.04em;
  background:var(--teal);color:#080c14;
  transition:transform 150ms, filter 150ms;
}
.btn-primary:hover{filter:brightness(1.1);transform:scale(1.02)}
.btn-primary:active{transform:scale(0.98)}

/* ── PAGE ────────────────────────────────────────────────────────────────── */
.page{
  max-width:1100px;margin:0 auto;
  padding:24px 24px 80px;
}

/* ── BENTO STATS ROW ─────────────────────────────────────────────────────── */
.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;margin-bottom:24px;
}
.stat-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px 24px;
  position:relative;overflow:hidden;
  transition:border-color 150ms, transform 200ms;
}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;
}
.stat-card.accent-teal::before{background:var(--teal)}
.stat-card.accent-purple::before{background:var(--purple)}
.stat-card.accent-amber::before{background:var(--amber)}
.stat-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--t4);margin-bottom:10px;
}
.stat-number{
  font-size:52px;font-weight:800;letter-spacing:-0.04em;
  line-height:1;color:var(--t1);
}
.stat-number.teal{color:var(--teal)}
.stat-number.purple{color:var(--purple)}
.stat-number.white{color:var(--t1)}
.stat-sub{font-size:12px;color:var(--t4);margin-top:8px}

/* ── FILTER ROW ──────────────────────────────────────────────────────────── */
.filter-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 4px 18px;margin-bottom:14px;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:10px;
}
.filter-links{
  display:flex;align-items:center;gap:0;
  flex-wrap:wrap;
}
.filter-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;
  color:var(--t4);
  cursor:pointer;
  padding:6px 14px;
  border-bottom:2px solid transparent;
  transition:color 150ms, border-color 150ms;
  user-select:none;background:none;border-top:none;border-left:none;border-right:none;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.filter-link:hover{color:var(--t2)}
.filter-link.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}
.filter-link .count{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--t4);
}
.filter-link.active .count{color:var(--teal)}
.filter-sep{color:var(--t5);padding:0 2px;font-weight:300;user-select:none}
.restore-btn{
  background:none;border:none;color:var(--amber);
  font-size:12px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;
  margin-left:6px;padding:2px 8px;
  border-radius:6px;
  transition:background 120ms;
}
.restore-btn:hover{background:var(--amber-dim)}

.last-run{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--t4);letter-spacing:0.04em;
  margin-left:auto;
}
.last-run strong{color:var(--t2);font-weight:600}

/* ── COLUMNS ─────────────────────────────────────────────────────────────── */
.columns{
  display:grid;grid-template-columns:1fr 1fr;
  gap:14px;align-items:start;
}
.column{display:flex;flex-direction:column;gap:12px}

/* ── JOB CARD ────────────────────────────────────────────────────────────── */
.jcard{
  position:relative;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px 20px;
  cursor:pointer;
  transition:transform 180ms, border-color 150ms, box-shadow 200ms;
  overflow:hidden;
  opacity:0;transform:translateY(8px);
  animation:cardIn 240ms ease-out forwards;
}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.jcard::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--t5);
}
.jcard.cat-CORE::before{background:var(--teal)}
.jcard.cat-ADJACENT::before{background:var(--purple)}
.jcard:hover{
  transform:translateY(-2px);
  border-color:var(--border2);
  box-shadow:0 4px 20px rgba(0,0,0,0.35);
}
.jcard.dim{opacity:0.55}

.jcard-row{
  display:flex;align-items:flex-start;gap:14px;
  margin-bottom:8px;
}
.jcard-main{flex:1;min-width:0}
.jcard-title{
  font-size:18px;font-weight:700;letter-spacing:-0.015em;
  color:var(--t1);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
  margin-bottom:5px;
}
.jcard-meta{
  font-size:13px;color:var(--t3);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  line-height:1.4;
}
.jcard-meta .company{color:var(--t2);font-weight:500}
.jcard-meta .salary{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mint)}
.jcard-meta .meta-sep{color:var(--t5)}

/* Big score block — top right */
.score-block{
  flex-shrink:0;
  min-width:56px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 8px 6px;border-radius:8px;
  background:var(--bg2);border:1px solid var(--border);
}
.score-number{
  font-size:40px;font-weight:800;letter-spacing:-0.04em;
  line-height:1;color:var(--t4);
  font-family:'Plus Jakarta Sans',sans-serif;
}
.score-block.high .score-number{color:var(--teal)}
.score-block.high{background:var(--teal-dim);border-color:rgba(0,229,204,0.30)}
.score-block.mid  .score-number{color:var(--amber)}
.score-block.mid {background:var(--amber-dim);border-color:rgba(245,166,35,0.25)}
.score-block.low  .score-number{color:var(--t4)}
.score-block.low {background:rgba(68,85,102,0.08);border-color:var(--border)}
.score-out{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--t4);letter-spacing:0.06em;
  margin-top:2px;
}
.score-pill{display:inline-flex} /* alias retained for substring checks */

/* Tags row + actions */
.jcard-footer{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-wrap:wrap;
}
.jcard-tags{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.tag{
  display:inline-flex;align-items:center;
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;
  font-weight:600;
  height:20px;padding:0 8px;border-radius:5px;
  background:var(--card3);color:var(--t3);
  border:1px solid transparent;
}
.tag-cat-core{background:var(--teal-dim);color:var(--teal);border-color:rgba(0,229,204,0.30)}
.tag-cat-adjacent{background:var(--purple-dim);color:var(--purple);border-color:rgba(185,131,255,0.30)}
.tag-source{background:var(--card3);color:var(--t3);border-color:var(--border)}
.tag-new{background:var(--amber);color:#080c14;border-color:transparent;font-weight:700}
.tag-saved{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,166,35,0.25)}
.tag-dismissed{background:rgba(239,68,68,0.06);color:var(--err);border-color:rgba(239,68,68,0.18)}

.jcard-actions{
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.act-btn{
  width:28px;height:28px;border-radius:6px;
  background:transparent;border:1px solid transparent;
  color:var(--t3);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 120ms;
}
.act-btn:hover{background:var(--card3);border-color:var(--border);color:var(--t1)}
.act-btn.toggled{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,166,35,0.30)}
.act-btn.eval:hover{background:var(--purple-dim);color:var(--purple);border-color:rgba(185,131,255,0.35)}
.act-btn.dismiss:hover{background:rgba(239,68,68,0.08);color:var(--err);border-color:rgba(239,68,68,0.25)}
.reason-toggle{
  height:28px;padding:0 10px;border-radius:6px;
  background:transparent;border:1px solid var(--border);
  color:var(--t3);font-size:10px;font-weight:600;
  font-family:'JetBrains Mono',monospace;letter-spacing:0.10em;
  text-transform:uppercase;
  cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
  transition:all 120ms;
}
.reason-toggle:hover{color:var(--t1);border-color:var(--border2);background:var(--card3)}
.reason-toggle .caret{transition:transform 200ms}
.reason-toggle.open .caret{transform:rotate(90deg)}

.jcard-reason{
  display:none;
  margin-top:12px;padding:12px 14px;
  background:var(--bg2);border-left:2px solid var(--border2);
  border-radius:0 6px 6px 0;
  font-size:12px;color:var(--t3);line-height:1.6;font-style:italic;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.jcard-reason.open{display:-webkit-box}

/* ── EMPTY ───────────────────────────────────────────────────────────────── */
.feed-empty{
  grid-column:1/-1;
  text-align:center;padding:80px 20px;color:var(--t3);
}
.feed-empty-icon{font-size:36px;color:var(--t5);margin-bottom:14px;line-height:1}
.feed-empty-t{font-size:18px;color:var(--t2);margin-bottom:6px;font-weight:600}
.feed-empty-s{font-size:13px;color:var(--t4)}

/* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media(max-width:840px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .columns{grid-template-columns:1fr}
}
@media(max-width:640px){
  .header{padding:0 16px}
  .page{padding:16px 14px 60px}
  .stat-number{font-size:42px}
  .jcard{padding:14px 16px}
  .jcard-title{font-size:17px}
  .score-number{font-size:34px}
  .score-block{min-width:50px}
  .search{max-width:none}
}

/* ── MODAL (preserved) ───────────────────────────────────────────────────── */
.modal-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 300ms ease;
}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{
  width:100%;max-width:780px;
  max-height:88vh;overflow-y:auto;
  background:var(--card);
  border:1px solid var(--border2);
  border-bottom:none;
  border-radius:20px 20px 0 0;
  padding:0 0 60px;
  transform:translateY(100%);
  transition:transform 380ms cubic-bezier(0.32,0.72,0,1);
}
.modal-backdrop.open .modal{transform:translateY(0)}

.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:16px auto 0}
.modal-header{
  padding:24px 32px 0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
}
.modal-title{font-size:22px;font-weight:800;letter-spacing:-0.03em;color:var(--t1);line-height:1.3}
.modal-company{font-size:15px;color:var(--t3);margin-top:4px}
.modal-close{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;margin-top:2px;
  background:transparent;border:1px solid var(--border2);
  color:var(--t3);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 150ms;
}
.modal-close:hover{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.35);color:var(--err)}

.modal-body{padding:28px 32px 0}
.eval-score-row{
  display:flex;align-items:center;gap:20px;
  background:var(--card2);border:1px solid var(--border);
  border-radius:14px;padding:20px 24px;margin-bottom:24px;
}
.eval-score-big{font-size:64px;font-weight:700;letter-spacing:-0.04em;line-height:1;flex-shrink:0}
.eval-score-big.high{color:var(--teal)}
.eval-score-big.mid{color:var(--amber)}
.eval-score-big.low{color:var(--err)}
.eval-score-meta{flex:1}
.eval-score-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--t4);
  margin-bottom:6px;
}
.eval-verdict{font-size:15px;color:var(--t2);line-height:1.65}
.eval-section{margin-bottom:22px}
.eval-section-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--t4);margin-bottom:10px;
}
.eval-cover{
  background:var(--card2);border-left:3px solid var(--teal);
  border-radius:0 10px 10px 0;padding:16px 20px;
  font-size:15px;color:var(--t1);line-height:1.7;font-style:italic;
}
.eval-cv-angle{
  background:var(--card2);border-left:3px solid var(--purple);
  border-radius:0 10px 10px 0;padding:14px 20px;
  font-size:14px;color:var(--t2);line-height:1.6;
}
.eval-points{display:flex;flex-direction:column;gap:8px}
.eval-point{
  display:flex;align-items:flex-start;gap:12px;
  background:var(--card2);border-radius:10px;padding:12px 16px;
  font-size:14px;color:var(--t2);line-height:1.6;
}
.eval-point::before{content:'→';color:var(--teal);font-weight:700;flex-shrink:0;margin-top:1px}
.eval-flags{display:flex;flex-direction:column;gap:8px}
.eval-flag{
  display:flex;align-items:flex-start;gap:12px;
  background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);
  border-radius:10px;padding:12px 16px;
  font-size:14px;color:var(--t2);line-height:1.6;
}
.eval-flag::before{content:'⚑';color:var(--err);flex-shrink:0;margin-top:1px}
.eval-salary{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--t3);
  background:var(--card2);border-radius:8px;padding:10px 14px;
}
.eval-loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 32px;gap:16px;
}
.eval-spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--border2);
  border-top-color:var(--teal);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.eval-loading-txt{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;letter-spacing:0.1em;color:var(--t4);
}
</style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:center;gap:0">
    <span class="logo">Remote<span class="logo-dot">.</span>jobs</span>
    <span class="logo-sub">Travis Shorrock</span>
  </div>
  <div class="search" role="search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#445566" stroke-width="2.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="q" type="text" placeholder="Search title, company, or reason…" aria-label="Search jobs">
    <span class="search-kbd">⌘K</span>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <span class="sdot inactive" id="sdot" aria-hidden="true"></span>
      <span id="hdr-status">Loading…</span>
    </div>
    <button class="btn-primary" onclick="triggerRun()" aria-label="Run job scraper">↻ Run Now</button>
  </div>
</header>

<main class="page">

  <!-- BENTO STATS ROW -->
  <div class="stats-row">
    <div class="stat-card accent-teal">
      <div class="stat-label">New Today</div>
      <div class="stat-number teal" id="m-new">0</div>
      <div class="stat-sub">Since last run</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active</div>
      <div class="stat-number white" id="m-total">0</div>
      <div class="stat-sub">Rolling 300</div>
    </div>
    <div class="stat-card accent-teal">
      <div class="stat-label">Core</div>
      <div class="stat-number teal" id="m-core">0</div>
      <div class="stat-sub">CD · Head of Creative</div>
    </div>
    <div class="stat-card accent-purple">
      <div class="stat-label">Adjacent</div>
      <div class="stat-number purple" id="m-adj">0</div>
      <div class="stat-sub">Design Dir · CMO · AI</div>
    </div>
  </div>

  <!-- FILTER ROW -->
  <div class="filter-row">
    <div class="filter-links" id="filter-links"></div>
    <div class="last-run" id="last-run">Last run: —</div>
  </div>

  <!-- TWO COLUMNS -->
  <div class="columns" id="columns">
    <div class="feed-empty">
      <div class="feed-empty-icon">◌</div>
      <div class="feed-empty-t">Loading…</div>
    </div>
  </div>

</main>

<!-- EVAL MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Evaluating…</div>
        <div class="modal-company" id="modal-company"></div>
      </div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close evaluation">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="eval-loading">
        <div class="eval-spinner"></div>
        <div class="eval-loading-txt">Claude is reading the role…</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const TODAY = new Date().toISOString().slice(0,10);
let jobs = [], meta = {};

// ── LOCAL STATE ───────────────────────────────────────────────────────────
const LS = { saved: 'jobSaved', dismissed: 'dismissed', filter: 'jobFilter' };

// Migrate prior keys
(() => {
  const map = { ts_dismissed: LS.dismissed, rj_dismissed: LS.dismissed, rj_saved: LS.saved };
  for (const [old, n] of Object.entries(map)) {
    const v = localStorage.getItem(old);
    if (v && !localStorage.getItem(n)) localStorage.setItem(n, v);
  }
})();

let saved     = new Set(JSON.parse(localStorage.getItem(LS.saved)     || '[]'));
let dismissed = new Set(JSON.parse(localStorage.getItem(LS.dismissed) || '[]'));
let currentFilter = localStorage.getItem(LS.filter) || 'active';

function persistSaved()    { localStorage.setItem(LS.saved,     JSON.stringify([...saved])); }
function persistDismissed(){ localStorage.setItem(LS.dismissed, JSON.stringify([...dismissed])); }
function persistFilter()   { localStorage.setItem(LS.filter,    currentFilter); }

// ── EVALUATE ──────────────────────────────────────────────────────────────
const WORKER_URL = 'https://job-eval-worker.travis-shorrock.workers.dev';

function evalJob(jobId, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const job = jobs.find(j => j.id === jobId);
  if (!job) return;
  openModal(job);
}

function openModal(job) {
  document.getElementById('modal-title').textContent   = job.title || 'Evaluating…';
  document.getElementById('modal-company').textContent = job.company || '';
  document.getElementById('modal-body').innerHTML = `
    <div class="eval-loading">
      <div class="eval-spinner"></div>
      <div class="eval-loading-txt">Claude is reading the role…</div>
    </div>`;
  const bd = document.getElementById('modal-backdrop');
  bd.classList.add('open');
  bd.dataset.jobId = job.id || '';
  document.body.style.overflow = 'hidden';
  runEval(job);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-backdrop') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal({ target: document.getElementById('modal-backdrop') });
    const q = document.getElementById('q');
    if (document.activeElement === q) { q.value = ''; render(); q.blur(); }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('q').focus();
  }
});

async function runEval(job) {
  const bodyEl = document.getElementById('modal-body');
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: job.title || '', company: job.company || '',
        description: job.description || '', salary: job.salary || '',
        url: job.url || '',
      })
    });
    if (!res.ok) throw new Error(`Worker returned ${res.status}`);
    const r = await res.json();
    if (r.error) throw new Error(r.error);
    renderEval(bodyEl, r);
  } catch (err) {
    bodyEl.innerHTML = `
      <div style="padding:40px 32px;text-align:center">
        <div style="font-size:32px;margin-bottom:12px">⚠</div>
        <div style="color:var(--err);font-size:15px;margin-bottom:8px">Evaluation failed</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4)">${err.message}</div>
      </div>`;
  }
}

function renderEval(el, r) {
  const sc = r.score || 0;
  const scClass = sc >= 7 ? 'high' : sc >= 4 ? 'mid' : 'low';
  const points = (r.talking_points || []).map(p => `<div class="eval-point">${escapeHtml(p)}</div>`).join('');
  const flags  = (r.red_flags || []).filter(f => f && f.trim()).map(f => `<div class="eval-flag">${escapeHtml(f)}</div>`).join('');
  const jobId  = document.getElementById('modal-backdrop').dataset.jobId || '';
  const job    = jobs.find(j => j.id === jobId) || {};

  el.innerHTML = `
    <div class="eval-score-row">
      <div class="eval-score-big ${scClass}">${sc}</div>
      <div class="eval-score-meta">
        <div class="eval-score-label">Match Score · ${escapeHtml(r.category || '')}</div>
        <div class="eval-verdict">${escapeHtml(r.verdict || '')}</div>
      </div>
    </div>
    <div class="eval-section">
      <div class="eval-section-label">Cover Letter Opening</div>
      <div class="eval-cover">${escapeHtml(r.cover_letter_hook || '—')}</div>
    </div>
    <div class="eval-section">
      <div class="eval-section-label">How to Angle Your CV</div>
      <div class="eval-cv-angle">${escapeHtml(r.cv_angle || '—')}</div>
    </div>
    ${points ? `<div class="eval-section"><div class="eval-section-label">Talking Points</div><div class="eval-points">${points}</div></div>` : ''}
    ${flags ? `<div class="eval-section"><div class="eval-section-label">Red Flags</div><div class="eval-flags">${flags}</div></div>` : ''}
    ${r.salary_note ? `<div class="eval-section"><div class="eval-section-label">Compensation Note</div><div class="eval-salary">${escapeHtml(r.salary_note)}</div></div>` : ''}
    <div style="margin-top:8px">
      <a href="${escapeAttr(job.url || '#')}" target="_blank" rel="noopener"
         style="display:block;text-align:center;padding:14px;border-radius:12px;
                background:var(--teal-dim);border:1px solid rgba(0,229,204,0.25);
                color:var(--teal);font-family:'JetBrains Mono',monospace;
                font-size:12px;letter-spacing:0.1em;font-weight:700;
                text-decoration:none;text-transform:uppercase">
        Open Role →
      </a>
    </div>`;
}

// ── TRIGGER RUN ───────────────────────────────────────────────────────────
async function triggerRun() {
  const btn = document.querySelector('.btn-primary');
  const orig = btn.textContent;
  btn.textContent = '↻ Running…';
  btn.disabled = true;
  btn.style.opacity = '0.6';
  try {
    const r = await fetch(WORKER_URL + '/run', { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      btn.textContent = '✓ Started';
      btn.style.background = 'var(--mint)';
      let secsLeft = 210;
      const countTick = setInterval(() => {
        secsLeft--;
        if (secsLeft > 0) btn.textContent = `↻ ${secsLeft}s`;
        else { clearInterval(countTick); resetBtn(); boot(); }
      }, 1000);
      function resetBtn() {
        btn.textContent = orig;
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.background = '';
      }
    } else {
      throw new Error(data.error || 'Unknown error');
    }
  } catch (e) {
    btn.textContent = '✗ Failed';
    btn.style.background = 'var(--err)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.background = '';
    }, 3000);
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const [jr, mr] = await Promise.all([
      fetch('data/jobs.json?t=' + Date.now()),
      fetch('data/meta.json?t=' + Date.now()),
    ]);
    jobs = await jr.json();
    meta = await mr.json();
  } catch (e) {
    jobs = []; meta = { updated: 'never', new_count: 0, total_count: 0 };
  }
  updateMeta();
  countUp();
  render();
}

// ── META ──────────────────────────────────────────────────────────────────
function updateMeta() {
  const ok = meta.updated && meta.updated !== 'never';
  const sdot = document.getElementById('sdot');
  if (ok) sdot.classList.remove('inactive'); else sdot.classList.add('inactive');
  document.getElementById('hdr-status').textContent = ok ? 'Active · Daily' : 'Not yet run';

  const lr = document.getElementById('last-run');
  if (ok) {
    const t = new Date(meta.updated).toLocaleString('en-US',
      { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    lr.innerHTML = `Last run: <strong>${escapeHtml(t)}</strong>`;
  } else {
    lr.textContent = 'Last run: —';
  }
}

// ── COUNT UP ──────────────────────────────────────────────────────────────
function countUp() {
  const active = jobs.filter(j => !dismissed.has(j.id || '') && (j.score || 0) >= 3);
  animateNumber('m-new',   active.filter(j => isNew(j)).length);
  animateNumber('m-total', active.length);
  animateNumber('m-core',  active.filter(j => (j.category || 'CORE') === 'CORE').length);
  animateNumber('m-adj',   active.filter(j => j.category === 'ADJACENT').length);
}

function animateNumber(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  const duration = 600;
  const from = 0;
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(from + (target - from) * ease);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── HELPERS ───────────────────────────────────────────────────────────────
const isNew = j => j.added && j.added.startsWith(TODAY);
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s); }
function scoreColor(s) {
  if (s >= 7) return '#00E5CC';
  if (s >= 4) return '#F5A623';
  return '#445566';
}
function scoreBg(s) {
  if (s >= 7) return 'rgba(0,229,204,0.12)';
  if (s >= 4) return 'rgba(245,166,35,0.12)';
  return 'rgba(68,85,102,0.12)';
}

// ── FILTER LOGIC ──────────────────────────────────────────────────────────
function getFilteredJobs() {
  const q = (document.getElementById('q').value || '').trim().toLowerCase();
  let r;
  switch (currentFilter) {
    case 'new':       r = jobs.filter(j => !dismissed.has(j.id||'') && isNew(j) && (j.score||0) >= 3); break;
    case 'saved':     r = jobs.filter(j => saved.has(j.id||'') && (j.score||0) >= 3); break;
    case 'dismissed': r = jobs.filter(j => dismissed.has(j.id||'')); break;
    default:          r = jobs.filter(j => !dismissed.has(j.id||'') && (j.score||0) >= 3);
  }
  if (q) r = r.filter(j =>
    (j.title||'').toLowerCase().includes(q) ||
    (j.company||'').toLowerCase().includes(q) ||
    (j.score_reason||'').toLowerCase().includes(q)
  );
  // Sort by score desc, then newest
  r.sort((a,b) => {
    const sd = (b.score||0) - (a.score||0);
    if (sd !== 0) return sd;
    return (new Date(b.added||0)) - (new Date(a.added||0));
  });
  return r;
}

// ── FILTER LINKS ──────────────────────────────────────────────────────────
function renderFilterLinks() {
  const today = TODAY;
  const counts = {
    active:    jobs.filter(j => !dismissed.has(j.id||'') && (j.score||0) >= 3).length,
    new:       jobs.filter(j => !dismissed.has(j.id||'') && (j.added||'').startsWith(today) && (j.score||0) >= 3).length,
    saved:     [...saved].filter(id => jobs.some(j => j.id === id)).length,
    dismissed: [...dismissed].filter(id => jobs.some(j => j.id === id)).length,
  };

  const link = (key, label) => {
    const active = currentFilter === key ? 'active' : '';
    return `<button type="button" class="filter-link ${active}" onclick="setFilter('${key}')">
      <span>${label}</span><span class="count">${counts[key]}</span>
    </button>`;
  };

  let html = '';
  html += link('active', 'Active');
  html += `<span class="filter-sep">·</span>`;
  html += link('new', 'New Today');
  html += `<span class="filter-sep">·</span>`;
  html += link('saved', '⭐ Saved');
  html += `<span class="filter-sep">·</span>`;
  html += link('dismissed', 'Dismissed');
  if (currentFilter === 'dismissed' && counts.dismissed > 0) {
    html += `<button type="button" class="restore-btn" onclick="restoreAllDismissed()" title="Restore all dismissed">↺ Restore all</button>`;
  }

  document.getElementById('filter-links').innerHTML = html;
}

function setFilter(key) {
  currentFilter = key;
  persistFilter();
  render();
}

function restoreAllDismissed() {
  dismissed.clear();
  persistDismissed();
  render();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function toggleSave(id, e)    { if (e) { e.preventDefault(); e.stopPropagation(); } saved.has(id) ? saved.delete(id) : saved.add(id); persistSaved(); render(); countUp(); }
function toggleDismiss(id, e) { if (e) { e.preventDefault(); e.stopPropagation(); } dismissed.has(id) ? dismissed.delete(id) : dismissed.add(id); persistDismissed(); render(); countUp(); }
function toggleReason(id, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const r = document.getElementById('reason-' + id);
  const t = document.getElementById('rtog-' + id);
  if (!r || !t) return;
  r.classList.toggle('open');
  t.classList.toggle('open');
}
function openCard(url) { if (url) window.open(url, '_blank', 'noopener'); }

// ── CARD ──────────────────────────────────────────────────────────────────
function makeCard(j, idx = 0) {
  const sc      = j.score || 0;
  const scCls   = sc >= 7 ? 'high' : sc >= 4 ? 'mid' : 'low';
  const cat     = (j.category || 'CORE').toUpperCase();
  const jid     = j.id || '';
  const isSaved = saved.has(jid);
  const isDism  = dismissed.has(jid);
  const delay   = Math.min(idx, 12) * 35;

  const tags = [];
  tags.push(`<span class="tag tag-cat-${cat.toLowerCase()}">${cat}</span>`);
  if (j.source) tags.push(`<span class="tag tag-source">${escapeHtml(j.source)}</span>`);
  if (isNew(j)) tags.push(`<span class="tag tag-new">New</span>`);
  if (isSaved)  tags.push(`<span class="tag tag-saved">★ Saved</span>`);
  if (isDism)   tags.push(`<span class="tag tag-dismissed">Dismissed</span>`);

  const meta = [];
  if (j.company) meta.push(`<span class="company">${escapeHtml(j.company)}</span>`);
  if (j.salary)  meta.push(`<span class="meta-sep">·</span><span class="salary">${escapeHtml(j.salary)}</span>`);

  const reasonHtml = j.score_reason ? `<div class="jcard-reason" id="reason-${jid}">"${escapeHtml(j.score_reason)}"</div>` : '';
  const reasonBtn  = j.score_reason
    ? `<button class="reason-toggle" id="rtog-${jid}" onclick="toggleReason('${jid}',event)" title="Toggle match reason"><span class="caret">▸</span> Reason</button>`
    : '';

  const url = j.url || '';
  return `<article class="jcard cat-${cat} ${isDism ? 'dim' : ''}" style="animation-delay:${delay}ms" onclick="openCard('${escapeAttr(url)}')" aria-label="${escapeAttr(j.title||'Job')} at ${escapeAttr(j.company||'Unknown')}">
    <div class="jcard-row">
      <div class="jcard-main">
        <div class="jcard-title">${escapeHtml(j.title || 'Untitled')}</div>
        <div class="jcard-meta">${meta.join(' ')}</div>
      </div>
      <div class="score-block ${scCls} score-pill">
        <div class="score-number">${sc}</div>
        <div class="score-out">/ 10</div>
      </div>
    </div>
    <div class="jcard-footer">
      <div class="jcard-tags">${tags.join('')}</div>
      <div class="jcard-actions">
        ${reasonBtn}
        <button class="act-btn ${isSaved ? 'toggled' : ''}" onclick="toggleSave('${jid}',event)" title="${isSaved ? 'Unsave' : 'Save'}">${isSaved ? '★' : '☆'}</button>
        <button class="act-btn eval" onclick="evalJob('${jid}',event)" title="Evaluate with Claude">⚡</button>
        <button class="act-btn dismiss" onclick="toggleDismiss('${jid}',event)" title="${isDism ? 'Restore' : 'Dismiss'}">✕</button>
      </div>
    </div>
    ${reasonHtml}
  </article>`;
}

// ── COLUMN DISTRIBUTION ───────────────────────────────────────────────────
function distributeColumns(list) {
  const col1 = [], col2 = [];
  list.forEach((job, i) => {
    if (i % 2 === 0) col1.push(job);
    else col2.push(job);
  });
  return [col1, col2];
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  renderFilterLinks();
  const list = getFilteredJobs();
  const root = document.getElementById('columns');

  if (!list.length) {
    const empty = jobs.length === 0
      ? { t: 'No data yet', s: 'Hit Run Now to populate.' }
      : currentFilter === 'saved' && saved.size === 0
        ? { t: 'No saved roles', s: 'Click ☆ on any card to save it.' }
        : currentFilter === 'dismissed'
          ? { t: 'Nothing dismissed', s: '✕ on any card moves it here.' }
          : { t: 'Nothing matches', s: 'Try a different filter or run the scraper.' };
    root.innerHTML = `<div class="feed-empty">
      <div class="feed-empty-icon">∅</div>
      <div class="feed-empty-t">${empty.t}</div>
      <div class="feed-empty-s">${empty.s}</div>
    </div>`;
    return;
  }

  const [col1, col2] = distributeColumns(list);
  let i = 0;
  const paintCol = arr => arr.map(j => makeCard(j, i++)).join('');
  root.innerHTML = `
    <div class="column">${paintCol(col1)}</div>
    <div class="column">${paintCol(col2)}</div>
  `;
}

// ── SEARCH BIND ───────────────────────────────────────────────────────────
document.getElementById('q').addEventListener('input', render);

// ── KICK OFF ──────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>

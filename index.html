<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Cabinet Grotesk';
            src: url('https://cdn.jsdelivr.net/gh/nicholasgillespie/font-cabinet-grotesk/fonts/CabinetGrotesk-Variable.woff2') format('woff2');
            font-weight: 100 900;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0c0f;
            --card: #12151a;
            --border: #1e2229;
            --border-hover: #2a2f38;
            --text: #c8cdd5;
            --text-dim: #5a6170;
            --text-bright: #eef0f3;
            --lime: #b4f650;
            --lime-dim: #3d5a1a;
            --coral: #ff6b6b;
            --coral-dim: #5a2222;
            --sky: #5bbcff;
            --sky-dim: #1a3d5a;
            --mono: 'Instrument Mono', 'SF Mono', 'Fira Code', monospace;
            --sans: 'Cabinet Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .page { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            font-family: var(--sans);
            font-size: 28px;
            font-weight: 800;
            color: var(--text-bright);
            letter-spacing: -0.5px;
        }

        .header-meta {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Stat tiles row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-tile {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
        }

        .stat-tile .value {
            font-family: var(--sans);
            font-size: 32px;
            font-weight: 800;
            color: var(--text-bright);
            line-height: 1;
        }

        .stat-tile .label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        .stat-tile.accent-lime .value { color: var(--lime); }
        .stat-tile.accent-coral .value { color: var(--coral); }
        .stat-tile.accent-sky .value { color: var(--sky); }

        /* Filters + search row */
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-pill {
            font-family: var(--mono);
            font-size: 12px;
            padding: 7px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .filter-pill:hover { border-color: var(--border-hover); color: var(--text); }
        .filter-pill.active { background: var(--lime); border-color: var(--lime); color: #0a0c0f; font-weight: 700; }

        .search-input {
            flex: 1;
            min-width: 180px;
            margin-left: auto;
            font-family: var(--mono);
            font-size: 12px;
            padding: 7px 14px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
        }

        .search-input:focus { border-color: var(--sky); }
        .search-input::placeholder { color: var(--text-dim); }

        /* Bento grid layout */
        .bento {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 12px;
            align-items: start;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .panel-header {
            font-family: var(--mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
        }

        /* Job list panel (left) */
        .jobs-panel {
            max-height: calc(100vh - 280px);
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .jobs-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .jobs-scroll::-webkit-scrollbar { width: 6px; }
        .jobs-scroll::-webkit-scrollbar-track { background: transparent; }
        .jobs-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .jobs-scroll::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        .job-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 12px;
            border-radius: 10px;
            transition: background 0.12s;
            cursor: default;
        }

        .job-row:hover { background: rgba(255,255,255,0.025); }

        .job-score {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .job-score.high { background: var(--lime-dim); color: var(--lime); }
        .job-score.med { background: rgba(255,180,50,0.15); color: #ffb432; }
        .job-score.low { background: rgba(255,255,255,0.04); color: var(--text-dim); }

        .job-info { flex: 1; min-width: 0; }

        .job-title-link {
            font-family: var(--sans);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-bright);
            text-decoration: none;
            line-height: 1.3;
            display: block;
        }

        .job-title-link:hover { color: var(--sky); }

        .job-sub {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 3px;
        }

        .job-desc {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tag-new {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--coral-dim);
            color: var(--coral);
            margin-left: 8px;
            vertical-align: middle;
        }

        /* Right column panels */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Manual boards */
        .boards-grid {
            padding: 12px 16px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .board-chip {
            font-family: var(--mono);
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--sky);
            text-decoration: none;
            transition: all 0.12s;
        }

        .board-chip:hover { background: var(--sky-dim); border-color: var(--sky); }

        /* Source breakdown */
        .source-list {
            padding: 12px 16px 16px;
        }

        .source-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
        }

        .source-row + .source-row { border-top: 1px solid var(--border); }

        .source-name {
            font-size: 13px;
            color: var(--text);
        }

        .source-count {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            background: rgba(255,255,255,0.04);
            padding: 2px 10px;
            border-radius: 100px;
        }

        /* Bar chart */
        .source-bar-wrap {
            flex: 1;
            margin: 0 12px;
            height: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 2px;
            overflow: hidden;
        }

        .source-bar {
            height: 100%;
            background: var(--lime);
            border-radius: 2px;
            opacity: 0.6;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
        }

        .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 4px; }

        /* Responsive */
        @media (max-width: 860px) {
            .bento { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .jobs-panel { max-height: none; }
        }

        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .page { padding: 16px 12px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>Job Tracker</h1>
            <div class="header-meta" id="header-meta">loading...</div>
        </div>

        <div class="stats-row" id="stats-row">
            <div class="stat-tile"><div class="value" id="st-total">--</div><div class="label">Total</div></div>
            <div class="stat-tile accent-lime"><div class="value" id="st-high">--</div><div class="label">High Match</div></div>
            <div class="stat-tile accent-coral"><div class="value" id="st-new">--</div><div class="label">New Today</div></div>
            <div class="stat-tile accent-sky"><div class="value" id="st-sources">--</div><div class="label">Sources</div></div>
        </div>

        <div class="controls">
            <button class="filter-pill active" data-filter="all">All</button>
            <button class="filter-pill" data-filter="new">New</button>
            <button class="filter-pill" data-filter="hot">Hot</button>
            <button class="filter-pill" data-filter="ai">AI</button>
            <button class="filter-pill" data-filter="adjacent">Adjacent</button>
            <input type="text" class="search-input" id="search" placeholder="search...">
        </div>

        <div class="bento">
            <div class="panel jobs-panel">
                <div class="panel-header">Jobs <span id="jobs-count"></span></div>
                <div class="jobs-scroll" id="jobs-list"></div>
            </div>

            <div class="right-col">
                <div class="panel" id="boards-panel">
                    <div class="panel-header">Manual Boards</div>
                    <div class="boards-grid" id="boards-grid"></div>
                </div>

                <div class="panel" id="sources-panel">
                    <div class="panel-header">Source Breakdown</div>
                    <div class="source-list" id="source-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let jobs = [];
        let meta = {};
        let filter = 'all';
        const AI_TERMS = ['ai ', 'ai-', 'artificial intelligence', 'generative', 'machine learning', 'llm', 'gpt', 'prompt'];
        const ADJACENT_TERMS = ['art director', 'brand director', 'design director', 'marketing director', 'content director', 'cmo', 'vp marketing', 'head of marketing'];

        async function load() {
            try {
                const [jr, mr] = await Promise.all([fetch('data/jobs.json'), fetch('data/meta.json')]);
                jobs = await jr.json();
                meta = await mr.json();
            } catch (e) {
                document.getElementById('jobs-list').innerHTML = '<div class="empty-state"><h3>Waiting for first run</h3></div>';
                return;
            }

            const d = meta.last_run ? new Date(meta.last_run) : null;
            document.getElementById('header-meta').textContent = d
                ? `updated ${d.toLocaleDateString()} ${d.toLocaleTimeString()}`
                : '';

            document.getElementById('st-total').textContent = jobs.length;
            document.getElementById('st-high').textContent = jobs.filter(j => j.score >= 5).length;
            document.getElementById('st-new').textContent = meta.new_count || 0;
            document.getElementById('st-sources').textContent = (meta.sources || []).length;

            renderBoards();
            renderSources();
            renderJobs();
            bindControls();
        }

        function isNew(job) {
            if (!meta.last_run) return false;
            const idx = jobs.indexOf(job);
            return idx < (meta.new_count || 0);
        }

        function isAI(job) {
            const blob = (job.title + ' ' + job.description).toLowerCase();
            return AI_TERMS.some(t => blob.includes(t));
        }

        function isAdjacent(job) {
            const blob = (job.title).toLowerCase();
            return ADJACENT_TERMS.some(t => blob.includes(t));
        }

        function renderJobs() {
            const q = document.getElementById('search').value.toLowerCase();
            let list = jobs;

            if (filter === 'new') list = list.filter(isNew);
            else if (filter === 'hot') list = list.filter(j => j.score >= 5);
            else if (filter === 'ai') list = list.filter(isAI);
            else if (filter === 'adjacent') list = list.filter(isAdjacent);

            if (q) list = list.filter(j =>
                j.title.toLowerCase().includes(q) ||
                j.company.toLowerCase().includes(q) ||
                j.source.toLowerCase().includes(q)
            );

            document.getElementById('jobs-count').textContent = `(${list.length})`;

            if (!list.length) {
                document.getElementById('jobs-list').innerHTML = '<div class="empty-state"><h3>No matches</h3><p>Try a different filter</p></div>';
                return;
            }

            document.getElementById('jobs-list').innerHTML = list.map(job => {
                const sc = job.score >= 5 ? 'high' : job.score >= 2 ? 'med' : 'low';
                const newTag = isNew(job) ? '<span class="tag-new">NEW</span>' : '';
                return `<div class="job-row">
                    <span class="job-score ${sc}">${job.score}</span>
                    <div class="job-info">
                        <a href="${job.url}" target="_blank" rel="noopener" class="job-title-link">${job.title}${newTag}</a>
                        <div class="job-sub">${job.company} / ${job.source}</div>
                        ${job.description ? `<div class="job-desc">${job.description}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function renderBoards() {
            const boards = meta.manual_boards || [];
            document.getElementById('boards-grid').innerHTML = boards.map(b =>
                `<a href="${b.url}" target="_blank" rel="noopener" class="board-chip">${b.name}</a>`
            ).join('');
        }

        function renderSources() {
            const counts = {};
            jobs.forEach(j => { counts[j.source] = (counts[j.source] || 0) + 1; });
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const max = sorted.length ? sorted[0][1] : 1;

            document.getElementById('source-list').innerHTML = sorted.map(([name, count]) => {
                const pct = Math.round((count / max) * 100);
                return `<div class="source-row">
                    <span class="source-name">${name}</span>
                    <div class="source-bar-wrap"><div class="source-bar" style="width:${pct}%"></div></div>
                    <span class="source-count">${count}</span>
                </div>`;
            }).join('');
        }

        function bindControls() {
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filter = btn.dataset.filter;
                    renderJobs();
                });
            });

            let t;
            document.getElementById('search').addEventListener('input', () => {
                clearTimeout(t);
                t = setTimeout(renderJobs, 150);
            });
        }

        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker — Travis Shorrock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
        }

        .meta {
            font-size: 13px;
            color: #64748b;
        }

        .meta span { margin-left: 12px; }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover { border-color: #60a5fa; color: #60a5fa; }
        .filter-btn.active { background: #2563eb; border-color: #2563eb; color: white; }

        .search-box {
            width: 100%;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
        }

        .search-box:focus { border-color: #2563eb; }
        .search-box::placeholder { color: #475569; }

        .job-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .job-card:hover { border-color: #475569; }
        .job-card.high { border-left: 3px solid #22c55e; }
        .job-card.medium { border-left: 3px solid #eab308; }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .job-title {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            text-decoration: none;
        }

        .job-title:hover { color: #60a5fa; }

        .score-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .score-high { background: #166534; color: #86efac; }
        .score-med { background: #854d0e; color: #fde047; }
        .score-low { background: #334155; color: #94a3b8; }

        .job-meta {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
        }

        .job-desc {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 8px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .boards-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #334155;
        }

        .boards-section h2 {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .board-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .board-link {
            padding: 6px 12px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #60a5fa;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }

        .board-link:hover { background: #334155; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
        }

        .empty-state p { margin-top: 8px; font-size: 14px; }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px 16px;
            flex: 1;
            min-width: 120px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        #loading {
            text-align: center;
            padding: 40px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Job Tracker</h1>
                <div class="meta" id="meta-info">Loading...</div>
            </div>
        </header>

        <div class="stats" id="stats"></div>

        <input type="text" class="search-box" id="search" placeholder="Search jobs by title, company, or source...">

        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="high">High Match (5+)</button>
            <button class="filter-btn" data-filter="medium">Medium (2-4)</button>
        </div>

        <div id="loading">Loading jobs...</div>
        <div id="jobs"></div>

        <div class="boards-section" id="boards-section" style="display:none;">
            <h2>Manual Boards to Check</h2>
            <div class="board-links" id="board-links"></div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let meta = {};
        let currentFilter = 'all';

        async function init() {
            try {
                const [jobsRes, metaRes] = await Promise.all([
                    fetch('data/jobs.json'),
                    fetch('data/meta.json'),
                ]);
                allJobs = await jobsRes.json();
                meta = await metaRes.json();
            } catch (e) {
                document.getElementById('loading').textContent = 'Waiting for first scrape run...';
                return;
            }

            document.getElementById('loading').style.display = 'none';

            if (meta.last_run) {
                const d = new Date(meta.last_run);
                document.getElementById('meta-info').textContent =
                    `Last updated: ${d.toLocaleDateString()} ${d.toLocaleTimeString()} · ${meta.total_count || allJobs.length} jobs tracked`;
            }

            // Stats
            const high = allJobs.filter(j => j.score >= 5).length;
            const med = allJobs.filter(j => j.score >= 2 && j.score < 5).length;
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-value">${allJobs.length}</div><div class="stat-label">Total Jobs</div></div>
                <div class="stat"><div class="stat-value">${high}</div><div class="stat-label">High Match</div></div>
                <div class="stat"><div class="stat-value">${med}</div><div class="stat-label">Worth a Look</div></div>
                <div class="stat"><div class="stat-value">${meta.new_count || 0}</div><div class="stat-label">New Today</div></div>
            `;

            // Manual boards
            const boards = meta.manual_boards || [];
            if (boards.length) {
                document.getElementById('boards-section').style.display = 'block';
                document.getElementById('board-links').innerHTML = boards.map(b =>
                    `<a href="${b.url}" target="_blank" rel="noopener" class="board-link">${b.name}</a>`
                ).join('');
            }

            renderJobs();
            setupFilters();
            setupSearch();
        }

        function renderJobs() {
            const container = document.getElementById('jobs');
            const query = document.getElementById('search').value.toLowerCase();

            let filtered = allJobs;

            if (currentFilter === 'high') filtered = filtered.filter(j => j.score >= 5);
            else if (currentFilter === 'medium') filtered = filtered.filter(j => j.score >= 2 && j.score < 5);

            if (query) {
                filtered = filtered.filter(j =>
                    j.title.toLowerCase().includes(query) ||
                    j.company.toLowerCase().includes(query) ||
                    j.source.toLowerCase().includes(query)
                );
            }

            if (!filtered.length) {
                container.innerHTML = '<div class="empty-state"><h3>No jobs found</h3><p>Try a different search or filter.</p></div>';
                return;
            }

            container.innerHTML = filtered.map(job => {
                const tier = job.score >= 5 ? 'high' : job.score >= 2 ? 'medium' : '';
                const scoreCls = job.score >= 5 ? 'score-high' : job.score >= 2 ? 'score-med' : 'score-low';
                return `
                <div class="job-card ${tier}">
                    <div class="job-header">
                        <a href="${job.url}" target="_blank" rel="noopener" class="job-title">${job.title}</a>
                        <span class="score-badge ${scoreCls}">${job.score}/10</span>
                    </div>
                    <div class="job-meta">${job.company} · ${job.source}</div>
                    ${job.description ? `<div class="job-desc">${job.description}</div>` : ''}
                </div>`;
            }).join('');
        }

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderJobs();
                });
            });
        }

        function setupSearch() {
            let timeout;
            document.getElementById('search').addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(renderJobs, 200);
            });
        }

        init();
    </script>
</body>
</html>
